site_name: 我的学习旅程
site_description: 记录学习、实践与思考
site_url: https://delayyyyyyy.github.io/

theme:
  name: material
  custom_dir: overrides
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

nav:
  - 首页: index.md
  - 学习记录:
      - 总览: journal/index.md
      - 第一篇记录: journal/first-note.md
  - agenticRL:
      - chap1: agenticRL/url01_dataloader-to-batch-explained.md
      - chap2: agenticRL/url02_agent-rollout-deep-dive.md
      - chap3: agenticRL/url03_reward-computation-deep-dive.md
      - chap4: agenticRL/url04_old-log-prob-deep-dive.md
  - rl:
      - Bellman Expectation Equation: rl/bellman_expectation_derivation_with_svg.md
      - Policy Gradient Derivation: rl/policy_gradient_derivation_with_svg.md
      - Policy Gradient 全解析: rl/policy_gradient.md
      - TRPO 推导详解: rl/trpo.md
  - 项目: projects.md
  - 写作指南: guides/writing.md
  - 科研英语: guides/research-english.md
  - 关于我: about.md

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

copyright: Copyright &copy; 2026 delayyyyyyy
