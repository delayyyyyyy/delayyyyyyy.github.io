<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
  </marker>
</defs>

<style>
  .title { font: 700 26px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#1f2937; }
  .subtitle { font: 500 16px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .label { font: 600 17px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#111827; }
  .small { font: 500 14px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#374151; }
  .tiny { font: 500 12px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .math { font: 600 15px 'Cambria Math', 'Times New Roman', serif; fill:#111827; }
  .box-blue { fill:#e8f1ff; stroke:#4f83d1; stroke-width:1.6; rx:14; }
  .box-orange { fill:#fff0e3; stroke:#f2a65a; stroke-width:1.6; rx:14; }
  .box-green { fill:#edf8e9; stroke:#70ad65; stroke-width:1.6; rx:14; }
  .box-purple { fill:#f2eafe; stroke:#8b5cf6; stroke-width:1.6; rx:14; }
  .box-gray { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .formula { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .arrow { stroke:#374151; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
  .arrow-dash { stroke:#6b7280; stroke-width:1.6; fill:none; stroke-dasharray:5 5; marker-end:url(#arrow); }
  .weight { font: 700 13px 'Arial', sans-serif; fill:#b45309; }
</style>

<text x="40" y="45" class="title" text-anchor="start">图 1：两层随机性如何变成 Bellman 期望</text>
<text x="40" y="75" class="subtitle" text-anchor="start">先按策略 π(a|s) 对动作加权，再按环境 p(s′|s,a) 对下一个状态加权。</text>
<rect x="495" y="115" width="210" height="72" class="box-blue" />
<text x="600" y="145" class="label" text-anchor="middle">
  <tspan x="600" dy="0">当前状态</tspan>
  <tspan x="600" dy="20">S_t = s</tspan>
</text>
<line x1="600" y1="187" x2="310" y2="260" class="arrow" />
<text x="455.0" y="225" class="weight" text-anchor="middle">π(right|s)=0.1</text>
<rect x="220" y="260" width="180" height="80" class="box-orange" />
<text x="310" y="292" class="label" text-anchor="middle">
  <tspan x="310" dy="0">动作 right</tspan>
  <tspan x="310" dy="20">Qπ(s,right)</tspan>
</text>
<line x1="600" y1="187" x2="590" y2="260" class="arrow" />
<text x="595.0" y="225" class="weight" text-anchor="middle">π(left|s)=0.7</text>
<rect x="500" y="260" width="180" height="80" class="box-orange" />
<text x="590" y="292" class="label" text-anchor="middle">
  <tspan x="590" dy="0">动作 left</tspan>
  <tspan x="590" dy="20">Qπ(s,left)</tspan>
</text>
<line x1="600" y1="187" x2="870" y2="260" class="arrow" />
<text x="735.0" y="225" class="weight" text-anchor="middle">π(up|s)=0.2</text>
<rect x="780" y="260" width="180" height="80" class="box-orange" />
<text x="870" y="292" class="label" text-anchor="middle">
  <tspan x="870" dy="0">动作 up</tspan>
  <tspan x="870" dy="20">Qπ(s,up)</tspan>
</text>
<line x1="870" y1="340" x2="760" y2="445" class="arrow" />
<text x="815.0" y="397" class="weight" text-anchor="middle">p(s′₁|s,up)=0.0</text>
<rect x="705" y="445" width="110" height="72" class="box-green" />
<text x="760" y="475" class="label" text-anchor="middle">
  <tspan x="760" dy="0">s′₁</tspan>
  <tspan x="760" dy="20">Vπ(s′₁)</tspan>
</text>
<line x1="870" y1="340" x2="975" y2="445" class="arrow" />
<text x="922.5" y="397" class="weight" text-anchor="middle">p(s′₂|s,up)=0.8</text>
<rect x="920" y="445" width="110" height="72" class="box-green" />
<text x="975" y="475" class="label" text-anchor="middle">
  <tspan x="975" dy="0">s′₂</tspan>
  <tspan x="975" dy="20">Vπ(s′₂)</tspan>
</text>
<line x1="870" y1="340" x2="1095" y2="445" class="arrow" />
<text x="982.5" y="397" class="weight" text-anchor="middle">p(s′₃|s,up)=0.2</text>
<rect x="1040" y="445" width="110" height="72" class="box-green" />
<text x="1095" y="475" class="label" text-anchor="middle">
  <tspan x="1095" dy="0">s′₃</tspan>
  <tspan x="1095" dy="20">Vπ(s′₃)</tspan>
</text>
<rect x="70" y="455" width="520" height="145" class="formula" />
<text x="330" y="495" class="math" text-anchor="middle">
  <tspan x="330" dy="0">Vπ(s) =  Σ_a  π(a|s) Qπ(s,a)</tspan>
  <tspan x="330" dy="32">      = 0.1 Qπ(s,right) + 0.7 Qπ(s,left) + 0.2 Qπ(s,up)</tspan>
</text>
<rect x="675" y="555" width="455" height="95" class="formula" />
<text x="902" y="590" class="math" text-anchor="middle">
  <tspan x="902" dy="0">Qπ(s,up) = r(s,up) + γ Σ_{s′} p(s′|s,up)Vπ(s′)</tspan>
  <tspan x="902" dy="28">= r(s,up)+γ[0·Vπ(s′₁)+0.8·Vπ(s′₂)+0.2·Vπ(s′₃)]</tspan>
</text>
</svg>