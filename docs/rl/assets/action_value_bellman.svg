<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
  </marker>
</defs>

<style>
  .title { font: 700 26px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#1f2937; }
  .subtitle { font: 500 16px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .label { font: 600 17px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#111827; }
  .small { font: 500 14px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#374151; }
  .tiny { font: 500 12px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .math { font: 600 15px 'Cambria Math', 'Times New Roman', serif; fill:#111827; }
  .box-blue { fill:#e8f1ff; stroke:#4f83d1; stroke-width:1.6; rx:14; }
  .box-orange { fill:#fff0e3; stroke:#f2a65a; stroke-width:1.6; rx:14; }
  .box-green { fill:#edf8e9; stroke:#70ad65; stroke-width:1.6; rx:14; }
  .box-purple { fill:#f2eafe; stroke:#8b5cf6; stroke-width:1.6; rx:14; }
  .box-gray { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .formula { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .arrow { stroke:#374151; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
  .arrow-dash { stroke:#6b7280; stroke-width:1.6; fill:none; stroke-dasharray:5 5; marker-end:url(#arrow); }
  .weight { font: 700 13px 'Arial', sans-serif; fill:#b45309; }
</style>

<text x="40" y="45" class="title" text-anchor="start">图 3：动作价值 Qπ(s,a) 的 Bellman expectation equation</text>
<text x="40" y="75" class="subtitle" text-anchor="start">Qπ(s,a) 已经固定当前动作 a，所以当前步没有 Σ_aπ(a|s)，但下一步动作 a′ 仍要按策略平均。</text>
<rect x="60" y="145" width="240" height="90" class="box-purple" />
<text x="180" y="180" class="label" text-anchor="middle">
  <tspan x="180" dy="0">已知当前</tspan>
  <tspan x="180" dy="20">S_t=s, A_t=a</tspan>
</text>
<rect x="395" y="105" width="210" height="80" class="box-orange" />
<text x="500" y="138" class="label" text-anchor="middle">
  <tspan x="500" dy="0">即时奖励</tspan>
  <tspan x="500" dy="20">r(s,a)</tspan>
</text>
<rect x="395" y="255" width="230" height="105" class="box-green" />
<text x="510" y="290" class="label" text-anchor="middle">
  <tspan x="510" dy="0">环境转移</tspan>
  <tspan x="510" dy="20">S_{t+1}=s′</tspan>
  <tspan x="510" dy="20">权重 p(s′|s,a)</tspan>
</text>
<rect x="730" y="250" width="210" height="115" class="box-orange" />
<text x="835" y="285" class="label" text-anchor="middle">
  <tspan x="835" dy="0">下一步策略</tspan>
  <tspan x="835" dy="20">A_{t+1}=a′</tspan>
  <tspan x="835" dy="20">权重 π(a′|s′)</tspan>
</text>
<rect x="1010" y="250" width="150" height="115" class="box-blue" />
<text x="1085" y="287" class="label" text-anchor="middle">
  <tspan x="1085" dy="0">未来价值</tspan>
  <tspan x="1085" dy="20">Qπ(s′,a′)</tspan>
</text>
<rect x="185" y="475" width="930" height="130" class="formula" />
<text x="650" y="517" class="math" text-anchor="middle">
  <tspan x="650" dy="0">Qπ(s,a) = r(s,a) + γ Σ_{s′} p(s′|s,a) Σ_{a′} π(a′|s′)Qπ(s′,a′)</tspan>
  <tspan x="650" dy="36">当前动作固定；随机性来自环境的 s′ 和下一步策略的 a′。</tspan>
</text>
<line x1="300" y1="190" x2="395" y2="145" class="arrow" />
<line x1="300" y1="190" x2="395" y2="310" class="arrow" />
<line x1="625" y1="307" x2="730" y2="307" class="arrow" />
<line x1="940" y1="307" x2="1010" y2="307" class="arrow" />
<line x1="500" y1="185" x2="500" y2="475" class="arrow" />
<line x1="510" y1="360" x2="510" y2="475" class="arrow" />
<line x1="835" y1="365" x2="835" y2="475" class="arrow" />
<line x1="1085" y1="365" x2="1085" y2="475" class="arrow" />
<text x="680" y="285" class="small" text-anchor="middle">Σ_{s′}</text>
<text x="975" y="285" class="small" text-anchor="middle">Σ_{a′}</text>
</svg>