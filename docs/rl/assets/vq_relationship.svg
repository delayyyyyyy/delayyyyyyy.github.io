<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="560" viewBox="0 0 1050 560">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
  </marker>
</defs>

<style>
  .title { font: 700 26px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#1f2937; }
  .subtitle { font: 500 16px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .label { font: 600 17px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#111827; }
  .small { font: 500 14px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#374151; }
  .tiny { font: 500 12px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .math { font: 600 15px 'Cambria Math', 'Times New Roman', serif; fill:#111827; }
  .box-blue { fill:#e8f1ff; stroke:#4f83d1; stroke-width:1.6; rx:14; }
  .box-orange { fill:#fff0e3; stroke:#f2a65a; stroke-width:1.6; rx:14; }
  .box-green { fill:#edf8e9; stroke:#70ad65; stroke-width:1.6; rx:14; }
  .box-purple { fill:#f2eafe; stroke:#8b5cf6; stroke-width:1.6; rx:14; }
  .box-gray { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .formula { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .arrow { stroke:#374151; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
  .arrow-dash { stroke:#6b7280; stroke-width:1.6; fill:none; stroke-dasharray:5 5; marker-end:url(#arrow); }
  .weight { font: 700 13px 'Arial', sans-serif; fill:#b45309; }
</style>

<text x="40" y="45" class="title" text-anchor="start">图 4：Vπ(s) 是 Qπ(s,a) 在当前策略下的加权平均</text>
<text x="40" y="75" class="subtitle" text-anchor="start">只知道状态 s 时，动作还没有固定；策略给每个动作一个概率，V 就是所有动作价值的期望。</text>
<rect x="425" y="115" width="200" height="75" class="box-blue" />
<text x="525" y="148" class="label" text-anchor="middle">
  <tspan x="525" dy="0">当前状态</tspan>
  <tspan x="525" dy="20">s</tspan>
</text>
<line x1="525" y1="190" x2="210" y2="285" class="arrow" />
<text x="367.5" y="235" class="weight" text-anchor="middle">π=0.1</text>
<rect x="110" y="285" width="200" height="78" class="box-orange" />
<text x="210" y="332" class="label" text-anchor="middle">Qπ(s,right)</text>
<line x1="525" y1="190" x2="525" y2="285" class="arrow" />
<text x="525.0" y="235" class="weight" text-anchor="middle">π=0.7</text>
<rect x="425" y="285" width="200" height="78" class="box-orange" />
<text x="525" y="332" class="label" text-anchor="middle">Qπ(s,left)</text>
<line x1="525" y1="190" x2="840" y2="285" class="arrow" />
<text x="682.5" y="235" class="weight" text-anchor="middle">π=0.2</text>
<rect x="740" y="285" width="200" height="78" class="box-orange" />
<text x="840" y="332" class="label" text-anchor="middle">Qπ(s,up)</text>
<rect x="300" y="440" width="450" height="78" class="formula" />
<text x="525" y="472" class="math" text-anchor="middle">
  <tspan x="525" dy="0">Vπ(s) = Σ_a π(a|s)Qπ(s,a)</tspan>
  <tspan x="525" dy="26">= 0.1Qπ(s,right)+0.7Qπ(s,left)+0.2Qπ(s,up)</tspan>
</text>
<line x1="210" y1="363" x2="525" y2="440" class="arrow" />
<line x1="525" y1="363" x2="525" y2="440" class="arrow" />
<line x1="840" y1="363" x2="525" y2="440" class="arrow" />
</svg>