<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1200" height="540" fill="#ffffff"/>
  <text x="40" y="55" font-size="34" font-family="Arial" font-weight="700" fill="#111827">Policy Gradient 的直观图：提高“带来高回报”的动作概率</text>

  <rect x="45" y="110" rx="18" ry="18" width="170" height="120" fill="#e8f2df" stroke="#9bb27d"/>
  <text x="130" y="175" text-anchor="middle" font-size="50" font-family="Georgia" font-style="italic" fill="#334155">s</text>
  <text x="130" y="212" text-anchor="middle" font-size="22" font-family="Arial" fill="#374151">当前状态 / 上下文</text>

  <line x1="215" y1="170" x2="325" y2="170" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="325" y="90" rx="24" ry="24" width="260" height="170" fill="#eef6ff" stroke="#86a9d7" stroke-width="2"/>
  <text x="455" y="165" text-anchor="middle" font-size="42" font-family="Arial" font-weight="700" fill="#2563eb">Policy NN</text>
  <text x="455" y="205" text-anchor="middle" font-size="24" font-family="Arial" fill="#475569">输出 logits → softmax</text>

  <line x1="585" y1="170" x2="685" y2="170" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="695" y="85" rx="18" ry="18" width="170" height="230" fill="#f8fbff" stroke="#bfd2ee"/>
  <text x="780" y="125" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#1d4ed8">π(a|s;θ)</text>
  <rect x="725" y="145" width="100" height="34" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="775" y="168" text-anchor="middle" font-size="21" font-family="Arial" fill="#1f2937">a₁ : 0.20</text>
  <rect x="725" y="190" width="100" height="34" fill="#bfdbfe" stroke="#93c5fd"/>
  <text x="775" y="213" text-anchor="middle" font-size="21" font-family="Arial" fill="#1f2937">a₂ : 0.40</text>
  <rect x="725" y="235" width="100" height="34" fill="#e0f2fe" stroke="#93c5fd"/>
  <text x="775" y="258" text-anchor="middle" font-size="21" font-family="Arial" fill="#1f2937">a₃ : 0.10</text>
  <rect x="725" y="280" width="100" height="34" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="775" y="303" text-anchor="middle" font-size="21" font-family="Arial" fill="#1f2937">a₄ : 0.30</text>

  <line x1="865" y1="170" x2="980" y2="170" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="980" y="88" rx="18" ry="18" width="180" height="165" fill="#fafafa" stroke="#d1d5db"/>
  <text x="1070" y="125" text-anchor="middle" font-size="28" font-family="Arial" font-weight="700" fill="#111827">采样动作</text>
  <text x="1070" y="172" text-anchor="middle" font-size="42" font-family="Georgia" font-style="italic" fill="#111827">A ~ π(·|s;θ)</text>
  <text x="1070" y="215" text-anchor="middle" font-size="22" font-family="Arial" fill="#4b5563">按概率随机选一个动作</text>

  <rect x="85" y="340" rx="20" ry="20" width="470" height="150" fill="#f0fdf4" stroke="#86efac"/>
  <text x="320" y="385" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#166534">如果某个动作后续带来高回报</text>
  <text x="320" y="427" text-anchor="middle" font-size="26" font-family="Arial" fill="#166534">就让 ∇θ log π(a|s;θ) · return 为正</text>
  <text x="320" y="465" text-anchor="middle" font-size="26" font-family="Arial" fill="#166534">⇒ 更新后该动作概率上升</text>

  <rect x="645" y="340" rx="20" ry="20" width="470" height="150" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="880" y="385" text-anchor="middle" font-size="30" font-family="Arial" font-weight="700" fill="#991b1b">如果某个动作后续带来低回报</text>
  <text x="880" y="427" text-anchor="middle" font-size="26" font-family="Arial" fill="#991b1b">就让 ∇θ log π(a|s;θ) · return 为负</text>
  <text x="880" y="465" text-anchor="middle" font-size="26" font-family="Arial" fill="#991b1b">⇒ 更新后该动作概率下降</text>
</svg>