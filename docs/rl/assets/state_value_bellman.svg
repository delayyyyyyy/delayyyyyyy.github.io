<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
  </marker>
</defs>

<style>
  .title { font: 700 26px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#1f2937; }
  .subtitle { font: 500 16px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .label { font: 600 17px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#111827; }
  .small { font: 500 14px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#374151; }
  .tiny { font: 500 12px 'Arial', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif; fill:#4b5563; }
  .math { font: 600 15px 'Cambria Math', 'Times New Roman', serif; fill:#111827; }
  .box-blue { fill:#e8f1ff; stroke:#4f83d1; stroke-width:1.6; rx:14; }
  .box-orange { fill:#fff0e3; stroke:#f2a65a; stroke-width:1.6; rx:14; }
  .box-green { fill:#edf8e9; stroke:#70ad65; stroke-width:1.6; rx:14; }
  .box-purple { fill:#f2eafe; stroke:#8b5cf6; stroke-width:1.6; rx:14; }
  .box-gray { fill:#f8fafc; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .formula { fill:#ffffff; stroke:#cbd5e1; stroke-width:1.4; rx:14; }
  .arrow { stroke:#374151; stroke-width:1.8; fill:none; marker-end:url(#arrow); }
  .arrow-dash { stroke:#6b7280; stroke-width:1.6; fill:none; stroke-dasharray:5 5; marker-end:url(#arrow); }
  .weight { font: 700 13px 'Arial', sans-serif; fill:#b45309; }
</style>

<text x="40" y="45" class="title" text-anchor="start">图 2：状态价值 Vπ(s) 的 Bellman expectation equation</text>
<text x="40" y="75" class="subtitle" text-anchor="start">Vπ(s) 没有固定当前动作，所以第一层必须对动作 a 按 π(a|s) 求期望。</text>
<rect x="60" y="135" width="180" height="80" class="box-blue" />
<text x="150" y="168" class="label" text-anchor="middle">
  <tspan x="150" dy="0">状态价值</tspan>
  <tspan x="150" dy="20">Vπ(s)</tspan>
</text>
<rect x="330" y="115" width="230" height="120" class="box-orange" />
<text x="445" y="150" class="label" text-anchor="middle">
  <tspan x="445" dy="0">策略随机性</tspan>
  <tspan x="445" dy="20">选择动作 a</tspan>
  <tspan x="445" dy="20">权重 π(a|s)</tspan>
</text>
<rect x="650" y="100" width="230" height="80" class="box-purple" />
<text x="765" y="132" class="label" text-anchor="middle">
  <tspan x="765" dy="0">即时奖励</tspan>
  <tspan x="765" dy="20">r(s,a)</tspan>
</text>
<rect x="650" y="235" width="230" height="110" class="box-green" />
<text x="765" y="270" class="label" text-anchor="middle">
  <tspan x="765" dy="0">环境随机性</tspan>
  <tspan x="765" dy="20">转移到 s′</tspan>
  <tspan x="765" dy="20">权重 p(s′|s,a)</tspan>
</text>
<rect x="965" y="235" width="180" height="110" class="box-blue" />
<text x="1055" y="272" class="label" text-anchor="middle">
  <tspan x="1055" dy="0">下个状态价值</tspan>
  <tspan x="1055" dy="20">Vπ(s′)</tspan>
</text>
<rect x="330" y="430" width="820" height="130" class="formula" />
<text x="740" y="472" class="math" text-anchor="middle">
  <tspan x="740" dy="0">Vπ(s) = Σ_a π(a|s) [ r(s,a) + γ Σ_{s′} p(s′|s,a)Vπ(s′) ]</tspan>
  <tspan x="740" dy="36">当前价值 = 对动作求平均 ×（即时奖励 + 折扣后的下一个状态价值期望）</tspan>
</text>
<line x1="240" y1="175" x2="330" y2="175" class="arrow" />
<line x1="560" y1="175" x2="650" y2="140" class="arrow" />
<line x1="560" y1="175" x2="650" y2="290" class="arrow" />
<line x1="880" y1="290" x2="965" y2="290" class="arrow" />
<line x1="765" y1="180" x2="765" y2="430" class="arrow" />
<line x1="1055" y1="345" x2="1055" y2="430" class="arrow" />
<line x1="445" y1="235" x2="445" y2="430" class="arrow" />
<text x="595" y="120" class="small" text-anchor="middle">第一层求和：Σ_a</text>
<text x="910" y="260" class="small" text-anchor="middle">第二层求和：Σ_{s′}</text>
</svg>