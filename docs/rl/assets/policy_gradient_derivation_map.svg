<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#ffffff"/>
  <text x="40" y="50" font-size="34" font-family="Arial" font-weight="700" fill="#111827">Policy Gradient 推导路线图</text>

  <rect x="55" y="90" rx="20" ry="20" width="500" height="115" fill="#f3f4f6" stroke="#cbd5e1"/>
  <text x="80" y="132" font-size="28" font-family="Arial" font-weight="700" fill="#111827">1) 定义优化目标</text>
  <text x="80" y="172" font-size="30" font-family="Georgia" fill="#111827">J(θ) = E<tspan baseline-shift="sub" font-size="18">τ~p<tspan baseline-shift="sub" font-size="14">θ</tspan>(τ)</tspan>[ R(τ) ]</text>
  <text x="80" y="198" font-size="20" font-family="Arial" fill="#475569">让参数为 θ 的策略产生高回报轨迹</text>

  <line x1="305" y1="205" x2="305" y2="258" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="55" y="258" rx="20" ry="20" width="500" height="120" fill="#eef6ff" stroke="#bfdbfe"/>
  <text x="80" y="300" font-size="28" font-family="Arial" font-weight="700" fill="#1d4ed8">2) 对 θ 求梯度</text>
  <text x="80" y="340" font-size="30" font-family="Georgia" fill="#111827">∇J(θ) = ∇ E<tspan baseline-shift="sub" font-size="18">τ~p<tspan baseline-shift="sub" font-size="14">θ</tspan>(τ)</tspan>[ R(τ) ]</text>
  <text x="80" y="366" font-size="20" font-family="Arial" fill="#475569">难点：期望里的分布 pθ(τ) 也依赖 θ</text>

  <line x1="305" y1="378" x2="305" y2="430" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="55" y="430" rx="20" ry="20" width="500" height="145" fill="#fff7ed" stroke="#fdba74"/>
  <text x="80" y="472" font-size="28" font-family="Arial" font-weight="700" fill="#c2410c">3) 使用 log-derivative trick</text>
  <text x="80" y="515" font-size="30" font-family="Georgia" fill="#111827">∇p<tspan baseline-shift="sub" font-size="18">θ</tspan>(τ) = p<tspan baseline-shift="sub" font-size="18">θ</tspan>(τ) ∇ log p<tspan baseline-shift="sub" font-size="18">θ</tspan>(τ)</text>
  <text x="80" y="546" font-size="22" font-family="Arial" fill="#475569">把“概率的梯度”改写成“概率 × 对数概率的梯度”</text>

  <line x1="305" y1="575" x2="305" y2="626" stroke="#4b5563" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="55" y="626" rx="20" ry="20" width="500" height="58" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="80" y="664" font-size="28" font-family="Georgia" fill="#111827">∇J(θ) = E<tspan baseline-shift="sub" font-size="18">τ~p<tspan baseline-shift="sub" font-size="14">θ</tspan>(τ)</tspan>[ R(τ) ∇ log p<tspan baseline-shift="sub" font-size="18">θ</tspan>(τ) ]</text>

  <rect x="640" y="125" rx="20" ry="20" width="500" height="155" fill="#faf5ff" stroke="#d8b4fe"/>
  <text x="665" y="165" font-size="28" font-family="Arial" font-weight="700" fill="#7c3aed">4) 展开轨迹对数概率</text>
  <text x="665" y="210" font-size="28" font-family="Georgia" fill="#111827">log p<tspan baseline-shift="sub" font-size="18">θ</tspan>(τ)</text>
  <text x="835" y="210" font-size="24" font-family="Arial" fill="#475569">= log ρ(s₀) + Σ log π<tspan baseline-shift="sub" font-size="16">θ</tspan>(a<tspan baseline-shift="sub" font-size="16">t</tspan>|s<tspan baseline-shift="sub" font-size="16">t</tspan>) + Σ log p(s<tspan baseline-shift="sub" font-size="16">t+1</tspan>|s<tspan baseline-shift="sub" font-size="16">t</tspan>,a<tspan baseline-shift="sub" font-size="16">t</tspan>)</text>
  <text x="665" y="248" font-size="22" font-family="Arial" fill="#475569">环境转移概率与 θ 无关，所以求梯度后只剩策略项</text>

  <rect x="640" y="330" rx="20" ry="20" width="500" height="140" fill="#f0fdf4" stroke="#86efac"/>
  <text x="665" y="370" font-size="28" font-family="Arial" font-weight="700" fill="#166534">5) 得到 REINFORCE 形式</text>
  <text x="665" y="413" font-size="30" font-family="Georgia" fill="#111827">∇J(θ) = E[ Σ G<tspan baseline-shift="sub" font-size="18">t</tspan> ∇ log π<tspan baseline-shift="sub" font-size="18">θ</tspan>(a<tspan baseline-shift="sub" font-size="18">t</tspan>|s<tspan baseline-shift="sub" font-size="18">t</tspan>) ]</text>
  <text x="665" y="447" font-size="22" font-family="Arial" fill="#475569">每一步动作的 log-prob 梯度，用对应回报来加权</text>

  <rect x="640" y="518" rx="20" ry="20" width="500" height="145" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="665" y="558" font-size="28" font-family="Arial" font-weight="700" fill="#1d4ed8">6) 写成 policy gradient theorem</text>
  <text x="665" y="603" font-size="27" font-family="Georgia" fill="#111827">∇J(θ) = E<tspan baseline-shift="sub" font-size="18">s~d<tspan baseline-shift="sub" font-size="14">π</tspan>, a~π</tspan>[ Q<tspan baseline-shift="sub" font-size="18">π</tspan>(s,a) ∇ log π<tspan baseline-shift="sub" font-size="18">θ</tspan>(a|s) ]</text>
  <text x="665" y="638" font-size="22" font-family="Arial" fill="#475569">再减去 baseline，可得到 advantage 形式，方差更小</text>
</svg>